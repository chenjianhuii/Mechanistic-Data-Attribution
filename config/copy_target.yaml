# config/copy_target.yaml

model:
  path: ""
  alias: "Pythia-160mlocal"

data:
  npy_path: ""
  num_train_samples: 819200
  seq_length: 2048
  batch_size_ekfac: 16
  batch_size_influence: 1
  num_workers: 2

target:
  layer: 5
  head: 10
  mode: "qkvo"

ekfac:
  damping: 1e-5
  damping_alpha: 0.1

probe:
  type: "copy_target_synthetic"
  num_samples: 200
  induction_match: "current"
  match_choice: "last"
  seq_len: 64
  seed: 1234

dtype: "bfloat16"

output:
  dir: ""
  top_k: 1536

